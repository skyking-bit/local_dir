<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyDash — Secure Navigation Hub</title>
  <style>
    /* ══════════════════════════════════════════
        ROOT VARIABLES & STYLES (Preserved)
    ══════════════════════════════════════════ */
    :root {
      --teal:      #009999;
      --teal-l:    #00d7be;
      --teal-d:    #007373;
      --teal-glow: rgba(0,153,153,0.22);
      --dark:      #0f1214;
      --dark2:     #161a1e;
      --card:      #1c2026;
      --card2:     #222830;
      --border:    #2a323c;
      --text:      #eef0f3;
      --muted:     #8a9bb0;
      --grn:       #4cdf8a;
      --org:       #f5a623;
      --red:       #e05252;
      --radius:    14px;
      --shadow:    0 10px 40px rgba(0,0,0,0.5);
      --glow:      0 0 28px rgba(0,153,153,0.28);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
    
    /* Grid Background */
    body::before{
      content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(0,153,153,0.035) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(0,153,153,0.035) 1px,transparent 1px);
      background-size:44px 44px;pointer-events:none;z-index:0
    }

    /* NAVIGATION */
    nav{
      position:sticky;top:0;z-index:500;height:62px;
      background:rgba(15,18,20,0.94);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 1.8rem;box-shadow:0 2px 24px rgba(0,0,0,0.45)
    }
    .brand{display:flex;align-items:center;gap:.7rem;text-decoration:none}
    .brand-box{
      width:38px;height:38px;background:linear-gradient(135deg,var(--teal),var(--teal-l));
      border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;font-weight:900;color:#fff;
    }
    .brand-name{font-size:1rem;font-weight:800;letter-spacing:2px;color:var(--teal);text-transform:uppercase}

    /* MAIN LAYOUT */
    .main{max-width:1300px;margin:0 auto;padding:1.8rem 1.5rem 3rem}
    .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}

    /* PAGE CARDS */
    .pc{
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      overflow:hidden;cursor:pointer;transition:all .25s;position:relative;
      display:flex;flex-direction:column;text-decoration:none;color:inherit;
    }
    .pc:hover{border-color:var(--teal);transform:translateY(-5px);box-shadow:var(--glow)}
    .c-head{padding:1.2rem;display:flex;justify-content:space-between;align-items:center}
    .c-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
    .c-body{padding:0 1.2rem 1.2rem}
    .c-name{font-size:1rem;font-weight:800;margin-bottom:.4rem}
    .c-desc{font-size:.8rem;color:var(--muted);line-height:1.6}

    /* PROTECTED LOCK BADGE */
    .lock-badge { position: absolute; top: 10px; right: 10px; font-size: 0.8rem; background: rgba(224,82,82,0.2); color: var(--red); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--red); }

    /* MODAL OVERLAY */
    .overlay{
      position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.85);
      backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;
    }
    .overlay.open{display:flex}
    .modal{background:var(--card);padding:2.5rem;border-radius:20px;border:1px solid var(--border);width:100%;max-width:400px;text-align:center}
    .pw-input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--dark);color:white;margin:15px 0;outline:none;text-align:center;letter-spacing:4px}
    .pw-input:focus{border-color:var(--teal)}
    .btn-p{width:100%;padding:12px;background:var(--teal);border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer}
    .err-msg{color:var(--red);font-size:0.8rem;margin-bottom:10px;display:none}
  </style>
</head>
<body>

<nav>
  <a href="#" class="brand">
    <div class="brand-box">S</div>
    <div class="brand-name">SkyDash</div>
  </a>
</nav>

<div class="main">
  <h2 style="margin-bottom: 2rem;">🗂️ Dash Navigation</h2>
  <div class="cg" id="cards-grid"></div>
</div>

<div class="overlay" id="gate-overlay">
  <div class="modal">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
    <h3 id="gate-title">Protected Content</h3>
    <p style="color:var(--muted); font-size: 0.8rem;">This page is confidential. Enter password to view.</p>
    <input type="password" id="gate-pass" class="pw-input" placeholder="••••">
    <div id="gate-err" class="err-msg">Incorrect password!</div>
    <button class="btn-p" onclick="verifyGate()">Unlock Page</button>
    <button style="background:none; border:none; color:var(--muted); margin-top:15px; cursor:pointer;" onclick="closeGate()">Cancel</button>
  </div>
</div>

<script>
  /* ════════════════════════════════════════
      PAGES DATA (From your pages.js)
  ════════════════════════════════════════ */
  const SKYDASH_PAGES = [
    { id: 1, name: 'Memory', url: 'select/mem.html', desc: 'BRAM configurations and reference guides.', category: 'design', icon: '🧠', color: '#009999', passwordProtected: false },
    { id: 2, name: 'Trigger', url: 'select/trig.html', desc: 'Configure and explore trigger logic.', category: 'design', icon: '⚡', color: '#f5a623', passwordProtected: false },
    { id: 3, name: 'Veloce', url: 'select/vel.html', desc: 'High-speed emulation and Veloce tools.', category: 'tools', icon: '🚀', color: '#b46fff', passwordProtected: false },
    { id: 4, name: 'Digital', url: 'select/Digital.html', desc: 'Digital interview questions (Confidential).', category: 'docs', icon: '🔐', color: '#e05252', passwordProtected: true }
  ];

  // This is the hashed version of 'coolsky' for better security
  const PASS_HASH = "80f68d9f109b85c332766346761614777d9c63c22b9c7b28276f57876823f38d"; 

  let pendingUrl = "";

  function render() {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = SKYDASH_PAGES.map(p => `
      <div class="pc" onclick="handleNavigation('${p.url}', ${p.passwordProtected}, '${p.name}')">
        ${p.passwordProtected ? '<span class="lock-badge">Private</span>' : ''}
        <div class="c-head">
          <div class="c-icon" style="background:${p.color}20">${p.icon}</div>
        </div>
        <div class="c-body">
          <div class="c-name">${p.name}</div>
          <div class="c-desc">${p.desc}</div>
        </div>
      </div>
    `).join('');
  }

  async function hashString(str) {
    const encoder = new TextEncoder();
    const data = encoder.encode(str);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function handleNavigation(url, isProtected, name) {
    if (isProtected) {
      pendingUrl = url;
      document.getElementById('gate-title').innerText = name;
      document.getElementById('gate-overlay').classList.add('open');
      document.getElementById('gate-pass').focus();
    } else {
      window.location.href = url;
    }
  }

  async function verifyGate() {
    const input = document.getElementById('gate-pass').value;
    const hashedInput = await hashString(input);
    
    if (hashedInput === PASS_HASH) {
      window.location.href = pendingUrl;
    } else {
      document.getElementById('gate-err').style.display = 'block';
      document.getElementById('gate-pass').value = '';
    }
  }

  function closeGate() {
    document.getElementById('gate-overlay').classList.remove('open');
    document.getElementById('gate-err').style.display = 'none';
  }

  // Handle Enter Key
  document.getElementById('gate-pass').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifyGate();
  });

  render();
</script>
</body>
</html>
